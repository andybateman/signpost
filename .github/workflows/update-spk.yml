name: Update SPK Price

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  update-price:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch SPK price
        run: |
          python3 - << 'EOF'
          import urllib.request, json
          from datetime import datetime, timezone

          url = 'https://query1.finance.yahoo.com/v8/finance/chart/SPK.NZ?interval=1d&range=1d'
          req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
          with urllib.request.urlopen(req, timeout=10) as r:
              data = json.loads(r.read())

          meta = data['chart']['result'][0]['meta']
          now = datetime.now(timezone.utc)

          trading = meta.get('currentTradingPeriod', {}).get('regular', {})
          ts = now.timestamp()
          market_open = bool(trading and trading.get('start', 0) <= ts <= trading.get('end', 0))

          price_data = {
              'price': meta['regularMarketPrice'],
              'currency': meta['currency'],
              'marketOpen': market_open,
              'updatedAt': now.isoformat()
          }

          with open('price.json', 'w') as f:
              json.dump(price_data, f)

          print(f"SPK: ${price_data['price']} {price_data['currency']}, market {'open' if market_open else 'closed'}")
          EOF

      - name: Commit if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add price.json
          git diff --staged --quiet || git commit -m "chore: update SPK price [skip ci]"
          git push
