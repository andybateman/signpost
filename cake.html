<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Is There Fruit?</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'><rect fill='%23002E6D' width='200' height='200'/><text x='50%' y='50%' font-size='120' font-weight='bold' fill='%23E86851' text-anchor='middle' dominant-baseline='middle' font-family='Arial'>EGL</text></svg>" type="image/svg+xml">
    <link href="https://fonts.cdnfonts.com/css/neue-power" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        * { margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            background-color: #1F3050;
            font-family: 'Neue Power', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .logo {
            position: absolute;
            width: 160px;
            top: 30px;
            right: 30px;
            filter: brightness(0) invert(1);
        }

        .logo-fruit-wrap {
            position: absolute;
            width: 160px;
            top: 22px;
            left: 36px;
            animation: fruit-pop 0.85s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        .logo-fruit {
            width: 100%;
            display: block;
            animation: fruit-bob 4s ease-in-out infinite;
            transform-box: fill-box;
            transform-origin: center;
        }

        @keyframes fruit-pop {
            from { transform: scale(0) rotate(-40deg); opacity: 0; }
            80% { transform: scale(1.1) rotate(6deg); opacity: 1; }
            to   { transform: scale(1) rotate(0deg);  opacity: 1; }
        }

        @keyframes fruit-bob {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            25% { transform: translateY(-8px) rotate(-2deg); }
            50% { transform: translateY(0px) rotate(0deg); }
            75% { transform: translateY(-6px) rotate(2deg); }
        }

        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding-top: 6vh;
        }

        h1 {
            font-family: 'Neue Power', sans-serif;
            font-size: clamp(2rem, 5vw, 5rem);
            color: #ffffff;
            font-weight: 500;
            letter-spacing: 0.08em;
            margin-bottom: 0.1em;
        }

        #answer {
            font-family: 'Neue Power', sans-serif;
            font-size: clamp(8rem, 22vw, 22rem);
            font-weight: 700;
            line-height: 0.9;
            transition: color 0.4s ease;
        }

        #answer.yes   { color: #4AD9A4; }
        #answer.no    { color: #EA6852; }
        #answer.wait  { color: #3D5070; }

        #price-line {
            margin-top: 1rem;
            font-size: clamp(1.1rem, 2.2vw, 2.2rem);
            color: #6B7FA3;
            font-weight: 400;
        }

        #price-line .price {
            color: #A0B0CC;
            font-weight: 500;
        }

        #threshold-note {
            margin-top: 0.4rem;
            font-size: clamp(0.8rem, 1.3vw, 1.3rem);
            color: #2E4060;
        }

        #chart-wrap {
            flex-shrink: 0;
            height: 160px;
            width: 100%;
            padding: 0 40px 44px;
        }

        #chart {
            width: 100%;
            height: 100%;
        }

        #status {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 1.2rem;
            font-size: clamp(0.75rem, 1.1vw, 1.1rem);
            color: #2E4060;
            white-space: nowrap;
        }

        #status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #2E4060;
            flex-shrink: 0;
        }

        #status .dot.live   { background-color: #4AD9A4; }
        #status .dot.closed { background-color: #EA6852; }
        #status .sep { color: #2E4060; }

        a[href*="tradingview"] { display: none !important; }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                transition-duration: 0.01ms !important;
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
            }
        }

        @media (max-width: 768px) {
            .logo { width: 110px; top: 20px; right: 20px; }
            .logo-fruit-wrap { width: 110px; top: 18px; left: 20px; }
            #chart-wrap { height: 120px; padding: 0 20px 40px; }
        }
    </style>
</head>
<body>

    <img class="logo" src="spark-nz-logo.svg" alt="Spark NZ">

    <div class="logo-fruit-wrap">
        <svg class="logo-fruit" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" aria-label="Fruit">
            <defs>
                <radialGradient id="grad-berry" cx="35%" cy="35%" r="65%">
                    <stop offset="0%" stop-color="#FF6B9D"/>
                    <stop offset="100%" stop-color="#C41E3A"/>
                </radialGradient>
                <radialGradient id="grad-seed" cx="40%" cy="40%" r="50%">
                    <stop offset="0%" stop-color="#FFD700"/>
                    <stop offset="100%" stop-color="#DAA520"/>
                </radialGradient>
                <linearGradient id="grad-leaf" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#52B788"/>
                    <stop offset="100%" stop-color="#2D6A4F"/>
                </linearGradient>
            </defs>

            <!-- Drop shadow -->
            <ellipse cx="51" cy="58" rx="38" ry="32" fill="rgba(0,0,0,0.25)"/>

            <!-- Main strawberry body -->
            <path d="M 50 15 C 65 20 72 32 72 48 C 72 65 62 75 50 78 C 38 75 28 65 28 48 C 28 32 35 20 50 15 Z" fill="url(#grad-berry)"/>

            <!-- Seeds row 1 -->
            <circle cx="38" cy="32" r="3.5" fill="url(#grad-seed)"/>
            <circle cx="50" cy="28" r="3.5" fill="url(#grad-seed)"/>
            <circle cx="62" cy="32" r="3.5" fill="url(#grad-seed)"/>

            <!-- Seeds row 2 -->
            <circle cx="32" cy="45" r="3.5" fill="url(#grad-seed)"/>
            <circle cx="50" cy="42" r="3.5" fill="url(#grad-seed)"/>
            <circle cx="68" cy="45" r="3.5" fill="url(#grad-seed)"/>

            <!-- Seeds row 3 -->
            <circle cx="38" cy="57" r="3.5" fill="url(#grad-seed)"/>
            <circle cx="50" cy="60" r="3.5" fill="url(#grad-seed)"/>
            <circle cx="62" cy="57" r="3.5" fill="url(#grad-seed)"/>

            <!-- Top leaves - left -->
            <ellipse cx="38" cy="18" rx="8" ry="12" fill="url(#grad-leaf)" transform="rotate(-35 38 18)"/>
            <ellipse cx="36" cy="16" rx="2.5" ry="4" fill="#1B4332" transform="rotate(-35 36 16)"/>

            <!-- Top leaves - center -->
            <ellipse cx="50" cy="10" rx="9" ry="13" fill="url(#grad-leaf)" transform="rotate(0 50 10)"/>
            <ellipse cx="50" cy="8" rx="2.5" ry="5" fill="#1B4332" transform="rotate(0 50 8)"/>

            <!-- Top leaves - right -->
            <ellipse cx="62" cy="18" rx="8" ry="12" fill="url(#grad-leaf)" transform="rotate(35 62 18)"/>
            <ellipse cx="64" cy="16" rx="2.5" ry="4" fill="#1B4332" transform="rotate(35 64 16)"/>

            <!-- Shine/highlight -->
            <ellipse cx="42" cy="38" rx="8" ry="12" fill="rgba(255,255,255,0.18)" transform="rotate(-25 42 38)"/>
            <ellipse cx="60" cy="52" rx="6" ry="10" fill="rgba(255,255,255,0.1)" transform="rotate(20 60 52)"/>
        </svg>
    </div>

    <div id="main">
        <h1>IS THERE FRUIT?</h1>
        <div id="answer" class="wait">...</div>
        <div id="price-line">NZX: SPK &mdash; <span class="price" id="price-val">loading</span></div>
        <div id="threshold-note">fruit when SPK &le; $2.00 NZD</div>
    </div>

    <div id="chart-wrap">
        <div id="chart"></div>
    </div>

    <div id="status">
        <div class="dot" id="market-dot"></div>
        <span id="market-label">checking</span>
        <span class="sep">&middot;</span>
        <span id="last-updated">—</span>
        <span class="sep">&middot;</span>
        <span id="next-refresh">—</span>
    </div>

    <script>
        const THRESHOLD = 2.00;
        const REFRESH_MS = 5 * 60 * 1000;

        const PRICE_URL   = 'https://raw.githubusercontent.com/andybateman/signpost/main/price.json';
        const HISTORY_URL = 'https://raw.githubusercontent.com/andybateman/signpost/main/spknz-history.json';

        let nextRefreshAt = 0;
        let countdownId;
        let refreshId;
        let chart, baselineSeries;

        // Chart setup
        function initChart() {
            const el = document.getElementById('chart');
            chart = LightweightCharts.createChart(el, {
                width: el.offsetWidth,
                height: el.offsetHeight,
                layout: {
                    background: { color: 'transparent' },
                    textColor: '#3D5070',
                },
                grid: {
                    vertLines: { color: '#243350' },
                    horzLines: { color: '#243350' },
                },
                rightPriceScale: {
                    borderColor: '#243350',
                    textColor: '#4A6080',
                    scaleMargins: { top: 0.1, bottom: 0.1 },
                },
                timeScale: {
                    borderColor: '#243350',
                    textColor: '#4A6080',
                    fixLeftEdge: true,
                    fixRightEdge: true,
                },
                crosshair: { mode: LightweightCharts.CrosshairMode.Magnet },
                handleScroll: false,
                handleScale: false,
            });

            baselineSeries = chart.addBaselineSeries({
                baseValue: { type: 'price', price: THRESHOLD },
                topLineColor: '#EA6852',
                topFillColor1: 'rgba(234,104,82,0.3)',
                topFillColor2: 'rgba(234,104,82,0.04)',
                bottomLineColor: '#4AD9A4',
                bottomFillColor1: 'rgba(74,217,164,0.04)',
                bottomFillColor2: 'rgba(74,217,164,0.3)',
                lineWidth: 2,
            });

            window.addEventListener('resize', () => {
                chart.applyOptions({ width: el.offsetWidth, height: el.offsetHeight });
            });
        }

        async function loadHistory() {
            try {
                const res = await fetch(HISTORY_URL + '?t=' + Date.now());
                if (!res.ok) return;
                const json = await res.json();
                const points = json.history.map(h => ({ time: h.date, value: h.close }));
                baselineSeries.setData(points);
                chart.timeScale().fitContent();
            } catch (e) {
                console.error('history fetch failed', e);
            }
        }

        async function fetchPrice() {
            const res = await fetch(PRICE_URL + '?t=' + Date.now());
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const json = await res.json();
            return { price: json.price, marketState: json.marketOpen ? 'OPEN' : 'CLOSED' };
        }

        function render({ price, marketState }) {
            const isCake = price <= THRESHOLD;
            const answerEl = document.getElementById('answer');
            answerEl.textContent = isCake ? 'YES' : 'NO';
            answerEl.className = isCake ? 'yes' : 'no';

            document.getElementById('price-val').textContent = '$' + price.toFixed(2) + ' NZD';

            const dot = document.getElementById('market-dot');
            dot.className = 'dot ' + (marketState === 'OPEN' ? 'live' : 'closed');
            document.getElementById('market-label').textContent =
                marketState === 'OPEN' ? 'market open' : 'market closed';

            const t = new Date();
            document.getElementById('last-updated').textContent =
                'updated ' + t.toLocaleTimeString('en-NZ', { hour: '2-digit', minute: '2-digit' });
        }

        function showError(msg) {
            const answerEl = document.getElementById('answer');
            answerEl.textContent = '?';
            answerEl.className = 'wait';
            document.getElementById('price-val').textContent = msg;
            document.getElementById('market-dot').className = 'dot';
            document.getElementById('market-label').textContent = 'error';
        }

        function startCountdown() {
            clearInterval(countdownId);
            nextRefreshAt = Date.now() + REFRESH_MS;
            countdownId = setInterval(() => {
                const rem = Math.max(0, nextRefreshAt - Date.now());
                const m = Math.floor(rem / 60000);
                const s = Math.floor((rem % 60000) / 1000);
                document.getElementById('next-refresh').textContent =
                    'refresh in ' + m + ':' + String(s).padStart(2, '0');
            }, 1000);
        }

        async function refresh() {
            clearTimeout(refreshId);
            try {
                const data = await fetchPrice();
                render(data);
            } catch (e) {
                showError('fetch failed');
                console.error(e);
            }
            startCountdown();
            refreshId = setTimeout(refresh, REFRESH_MS);
        }

        initChart();
        loadHistory();
        refresh();
    </script>
</body>
</html>
