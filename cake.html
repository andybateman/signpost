<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Is There Pizza?</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'><rect fill='%23002E6D' width='200' height='200'/><text x='50%' y='50%' font-size='120' font-weight='bold' fill='%23E86851' text-anchor='middle' dominant-baseline='middle' font-family='Arial'>EGL</text></svg>" type="image/svg+xml">
    <link href="https://fonts.cdnfonts.com/css/neue-power" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        * { margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            background-color: #1F3050;
            font-family: 'Neue Power', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .logo {
            position: absolute;
            width: 160px;
            top: 30px;
            right: 30px;
            filter: brightness(0) invert(1);
        }

        .logo-pizza-wrap {
            position: absolute;
            width: 160px;
            top: 22px;
            left: 36px;
            animation: pizza-pop 0.85s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        .logo-pizza {
            width: 100%;
            display: block;
            animation: pizza-spin 28s linear 0.85s infinite;
            transform-box: fill-box;
            transform-origin: center;
        }

        @keyframes pizza-pop {
            from { transform: scale(0) rotate(-40deg); opacity: 0; }
            80% { transform: scale(1.1) rotate(6deg); opacity: 1; }
            to   { transform: scale(1) rotate(0deg);  opacity: 1; }
        }

        @keyframes pizza-spin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding-top: 6vh;
        }

        h1 {
            font-family: 'Neue Power', sans-serif;
            font-size: clamp(2rem, 5vw, 5rem);
            color: #ffffff;
            font-weight: 500;
            letter-spacing: 0.08em;
            margin-bottom: 0.1em;
        }

        #answer {
            font-family: 'Neue Power', sans-serif;
            font-size: clamp(8rem, 22vw, 22rem);
            font-weight: 700;
            line-height: 0.9;
            transition: color 0.4s ease;
        }

        #answer.yes   { color: #4AD9A4; }
        #answer.no    { color: #EA6852; }
        #answer.wait  { color: #3D5070; }

        #price-line {
            margin-top: 1rem;
            font-size: clamp(1.1rem, 2.2vw, 2.2rem);
            color: #6B7FA3;
            font-weight: 400;
        }

        #price-line .price {
            color: #A0B0CC;
            font-weight: 500;
        }

        #threshold-note {
            margin-top: 0.4rem;
            font-size: clamp(0.8rem, 1.3vw, 1.3rem);
            color: #2E4060;
        }

        #chart-wrap {
            flex-shrink: 0;
            height: 160px;
            width: 100%;
            padding: 0 40px 44px;
        }

        #chart {
            width: 100%;
            height: 100%;
        }

        #status {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 1.2rem;
            font-size: clamp(0.75rem, 1.1vw, 1.1rem);
            color: #2E4060;
            white-space: nowrap;
        }

        #status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #2E4060;
            flex-shrink: 0;
        }

        #status .dot.live   { background-color: #4AD9A4; }
        #status .dot.closed { background-color: #EA6852; }
        #status .sep { color: #2E4060; }

        a[href*="tradingview"] { display: none !important; }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                transition-duration: 0.01ms !important;
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
            }
        }

        @media (max-width: 768px) {
            .logo { width: 110px; top: 20px; right: 20px; }
            .logo-pizza-wrap { width: 110px; top: 18px; left: 20px; }
            #chart-wrap { height: 120px; padding: 0 20px 40px; }
        }
    </style>
</head>
<body>

    <img class="logo" src="spark-nz-logo.svg" alt="Spark NZ">

    <div class="logo-pizza-wrap">
        <svg class="logo-pizza" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" aria-label="Pizza">
            <defs>
                <radialGradient id="pg-crust" cx="40%" cy="36%" r="65%">
                    <stop offset="0%" stop-color="#EDB870"/>
                    <stop offset="100%" stop-color="#9A5418"/>
                </radialGradient>
                <radialGradient id="pg-sauce" cx="40%" cy="36%" r="65%">
                    <stop offset="0%" stop-color="#F08268"/>
                    <stop offset="100%" stop-color="#B83820"/>
                </radialGradient>
                <radialGradient id="pg-cheese" cx="38%" cy="33%" r="70%">
                    <stop offset="0%" stop-color="#FFE668"/>
                    <stop offset="70%" stop-color="#E8C020"/>
                    <stop offset="100%" stop-color="#BE9608"/>
                </radialGradient>
                <radialGradient id="pg-pep" cx="33%" cy="28%" r="72%">
                    <stop offset="0%" stop-color="#D04028"/>
                    <stop offset="100%" stop-color="#6E1008"/>
                </radialGradient>
            </defs>

            <!-- Drop shadow -->
            <ellipse cx="51.5" cy="53.5" rx="41" ry="41" fill="rgba(0,0,0,0.28)"/>

            <!-- Crust -->
            <circle cx="50" cy="50" r="44" fill="url(#pg-crust)"/>
            <!-- Sauce -->
            <circle cx="50" cy="50" r="36" fill="url(#pg-sauce)"/>
            <!-- Cheese -->
            <circle cx="50" cy="50" r="28" fill="url(#pg-cheese)"/>

            <!-- Slice lines -->
            <line x1="50" y1="6" x2="50" y2="94" stroke="#8A4408" stroke-width="1.2" opacity="0.45"/>
            <line x1="6" y1="50" x2="94" y2="50" stroke="#8A4408" stroke-width="1.2" opacity="0.45"/>
            <line x1="19" y1="19" x2="81" y2="81" stroke="#8A4408" stroke-width="1.2" opacity="0.45"/>
            <line x1="81" y1="19" x2="19" y2="81" stroke="#8A4408" stroke-width="1.2" opacity="0.45"/>

            <!-- Pepperoni top -->
            <circle cx="50" cy="33" r="6" fill="url(#pg-pep)"/>
            <circle cx="49" cy="31.5" r="2.2" fill="rgba(255,255,255,0.14)"/>

            <!-- Pepperoni bottom-left -->
            <circle cx="33" cy="61" r="6" fill="url(#pg-pep)"/>
            <circle cx="32" cy="59.5" r="2.2" fill="rgba(255,255,255,0.14)"/>

            <!-- Pepperoni bottom-right -->
            <circle cx="67" cy="61" r="6" fill="url(#pg-pep)"/>
            <circle cx="66" cy="59.5" r="2.2" fill="rgba(255,255,255,0.14)"/>

            <!-- Smaller pepperoni upper-left -->
            <circle cx="38" cy="43" r="4.5" fill="url(#pg-pep)"/>
            <circle cx="37.2" cy="41.8" r="1.6" fill="rgba(255,255,255,0.14)"/>

            <!-- Smaller pepperoni upper-right -->
            <circle cx="62" cy="43" r="4.5" fill="url(#pg-pep)"/>
            <circle cx="61.2" cy="41.8" r="1.6" fill="rgba(255,255,255,0.14)"/>

            <!-- Basil leaves -->
            <ellipse cx="55" cy="56" rx="5" ry="2.8" fill="#4A8A2A" transform="rotate(40 55 56)"/>
            <ellipse cx="56.5" cy="57" rx="1.8" ry="1" fill="#6AB840" transform="rotate(40 56.5 57)"/>
            <ellipse cx="44" cy="54" rx="4.2" ry="2.4" fill="#3A7820" transform="rotate(-30 44 54)"/>
            <ellipse cx="45.2" cy="54.8" rx="1.4" ry="0.9" fill="#5AA830" transform="rotate(-30 45.2 54.8)"/>

            <!-- Cheese highlight -->
            <ellipse cx="42" cy="41" rx="7" ry="4.5" fill="rgba(255,252,200,0.28)" transform="rotate(-25 42 41)"/>

            <!-- Crust edge highlight -->
            <path d="M 14 33 A 44 44 0 0 1 33 14" stroke="rgba(255,224,150,0.38)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        </svg>
    </div>

    <div id="main">
        <h1>IS THERE PIZZA?</h1>
        <div id="answer" class="wait">...</div>
        <div id="price-line">NZX: SPK &mdash; <span class="price" id="price-val">loading</span></div>
        <div id="threshold-note">pizza when SPK &le; $2.00 NZD</div>
    </div>

    <div id="chart-wrap">
        <div id="chart"></div>
    </div>

    <div id="status">
        <div class="dot" id="market-dot"></div>
        <span id="market-label">checking</span>
        <span class="sep">&middot;</span>
        <span id="last-updated">—</span>
        <span class="sep">&middot;</span>
        <span id="next-refresh">—</span>
    </div>

    <script>
        const THRESHOLD = 2.00;
        const REFRESH_MS = 5 * 60 * 1000;

        const PRICE_URL   = 'https://raw.githubusercontent.com/andybateman/signpost/main/price.json';
        const HISTORY_URL = 'https://raw.githubusercontent.com/andybateman/signpost/main/spknz-history.json';

        let nextRefreshAt = 0;
        let countdownId;
        let refreshId;
        let chart, baselineSeries;

        // Chart setup
        function initChart() {
            const el = document.getElementById('chart');
            chart = LightweightCharts.createChart(el, {
                width: el.offsetWidth,
                height: el.offsetHeight,
                layout: {
                    background: { color: 'transparent' },
                    textColor: '#3D5070',
                },
                grid: {
                    vertLines: { color: '#243350' },
                    horzLines: { color: '#243350' },
                },
                rightPriceScale: {
                    borderColor: '#243350',
                    textColor: '#4A6080',
                    scaleMargins: { top: 0.1, bottom: 0.1 },
                },
                timeScale: {
                    borderColor: '#243350',
                    textColor: '#4A6080',
                    fixLeftEdge: true,
                    fixRightEdge: true,
                },
                crosshair: { mode: LightweightCharts.CrosshairMode.Magnet },
                handleScroll: false,
                handleScale: false,
            });

            baselineSeries = chart.addBaselineSeries({
                baseValue: { type: 'price', price: THRESHOLD },
                topLineColor: '#EA6852',
                topFillColor1: 'rgba(234,104,82,0.3)',
                topFillColor2: 'rgba(234,104,82,0.04)',
                bottomLineColor: '#4AD9A4',
                bottomFillColor1: 'rgba(74,217,164,0.04)',
                bottomFillColor2: 'rgba(74,217,164,0.3)',
                lineWidth: 2,
            });

            window.addEventListener('resize', () => {
                chart.applyOptions({ width: el.offsetWidth, height: el.offsetHeight });
            });
        }

        async function loadHistory() {
            try {
                const res = await fetch(HISTORY_URL + '?t=' + Date.now());
                if (!res.ok) return;
                const json = await res.json();
                const points = json.history.map(h => ({ time: h.date, value: h.close }));
                baselineSeries.setData(points);
                chart.timeScale().fitContent();
            } catch (e) {
                console.error('history fetch failed', e);
            }
        }

        async function fetchPrice() {
            const res = await fetch(PRICE_URL + '?t=' + Date.now());
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const json = await res.json();
            return { price: json.price, marketState: json.marketOpen ? 'OPEN' : 'CLOSED' };
        }

        function render({ price, marketState }) {
            const isCake = price <= THRESHOLD;
            const answerEl = document.getElementById('answer');
            answerEl.textContent = isCake ? 'YES' : 'NO';
            answerEl.className = isCake ? 'yes' : 'no';

            document.getElementById('price-val').textContent = '$' + price.toFixed(2) + ' NZD';

            const dot = document.getElementById('market-dot');
            dot.className = 'dot ' + (marketState === 'OPEN' ? 'live' : 'closed');
            document.getElementById('market-label').textContent =
                marketState === 'OPEN' ? 'market open' : 'market closed';

            const t = new Date();
            document.getElementById('last-updated').textContent =
                'updated ' + t.toLocaleTimeString('en-NZ', { hour: '2-digit', minute: '2-digit' });
        }

        function showError(msg) {
            const answerEl = document.getElementById('answer');
            answerEl.textContent = '?';
            answerEl.className = 'wait';
            document.getElementById('price-val').textContent = msg;
            document.getElementById('market-dot').className = 'dot';
            document.getElementById('market-label').textContent = 'error';
        }

        function startCountdown() {
            clearInterval(countdownId);
            nextRefreshAt = Date.now() + REFRESH_MS;
            countdownId = setInterval(() => {
                const rem = Math.max(0, nextRefreshAt - Date.now());
                const m = Math.floor(rem / 60000);
                const s = Math.floor((rem % 60000) / 1000);
                document.getElementById('next-refresh').textContent =
                    'refresh in ' + m + ':' + String(s).padStart(2, '0');
            }, 1000);
        }

        async function refresh() {
            clearTimeout(refreshId);
            try {
                const data = await fetchPrice();
                render(data);
            } catch (e) {
                showError('fetch failed');
                console.error(e);
            }
            startCountdown();
            refreshId = setTimeout(refresh, REFRESH_MS);
        }

        initChart();
        loadHistory();
        refresh();
    </script>
</body>
</html>
