<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏱</text></svg>">
    <link href="https://fonts.cdnfonts.com/css/neue-power" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        * { margin: 0; padding: 0; }
        html, body { height: 100%; }

        body {
            font-family: 'Neue Power', sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(ellipse 70% 35% at 50% 0%, rgba(232,104,81,0.10) 0%, transparent 60%),
                linear-gradient(
                    to bottom,
                    #030d1f 0%,
                    #041326 40%,
                    #062F6E 100%
                );
            position: relative;
        }

        /* Logos */
        .logo-egl {
            position: absolute;
            width: 160px;
            top: 28px;
            left: 28px;
            filter: brightness(0) invert(1);
            opacity: 0.85;
        }

        .logo-spark {
            position: absolute;
            width: 140px;
            top: 28px;
            right: 28px;
            filter: brightness(0) invert(1);
            opacity: 0.7;
        }

        /* Main layout */
        .main {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            z-index: 1;
            padding: 0 20px;
        }

        .title {
            font-size: clamp(1.1rem, 2.6vw, 2.6rem);
            font-weight: 500;
            letter-spacing: 0.14em;
            color: rgba(255,255,255,0.75);
            text-transform: uppercase;
            text-align: center;
        }

        .countdown {
            display: flex;
            gap: clamp(8px, 1.5vw, 20px);
            align-items: flex-end;
        }

        .unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.7rem;
        }

        /* ── Split-flap card ── */
        .flap {
            position: relative;
            width: clamp(120px, 20vw, 260px);
            height: clamp(120px, 20vw, 260px);
            perspective: 800px;
        }

        /* Static top and bottom halves */
        .half {
            position: absolute;
            left: 0;
            right: 0;
            height: 50%;
            overflow: hidden;
            background: rgba(14,14,14,0.88);
            box-shadow: 0 8px 40px rgba(0,0,0,0.6);
        }
        .half.top    { top: 0;    border-radius: 12px 12px 0 0; }
        .half.bottom { bottom: 0; border-radius: 0 0 12px 12px; }

        /* Number positioned to fill the full panel, clipped by each half */
        .num {
            position: absolute;
            left: 0;
            right: 0;
            height: 200%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(3rem, 8.5vw, 9.5rem);
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.02em;
            font-variant-numeric: tabular-nums;
        }
        .half.top    .num { top: 0;    }
        .half.bottom .num { bottom: 0; }

        /* Horizontal split line */
        .flap-divider {
            position: absolute;
            left: 0;
            right: 0;
            top: 50%;
            height: 2px;
            background: rgba(0,0,0,0.7);
            transform: translateY(-50%);
            z-index: 10;
            pointer-events: none;
        }

        /* Animated flip cards */
        .fold-top, .fold-bottom {
            position: absolute;
            left: 0;
            right: 0;
            height: 50%;
            overflow: hidden;
            background: rgba(14,14,14,0.88);
            transform-style: preserve-3d;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            z-index: 5;
        }

        .fold-top {
            top: 0;
            border-radius: 12px 12px 0 0;
            transform-origin: bottom center;
            animation: fold-away 0.22s ease-in forwards;
        }

        .fold-bottom {
            bottom: 0;
            border-radius: 0 0 12px 12px;
            transform-origin: top center;
            transform: rotateX(90deg);
            animation: fold-in 0.22s ease-out 0.18s forwards;
        }

        @keyframes fold-away {
            from { transform: rotateX(0deg); }
            to   { transform: rotateX(-90deg); }
        }

        @keyframes fold-in {
            from { transform: rotateX(90deg); }
            to   { transform: rotateX(0deg); }
        }

        /* Label */
        .label {
            font-size: clamp(0.65rem, 1.2vw, 1.1rem);
            font-weight: 600;
            letter-spacing: 0.22em;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
        }

        /* Error state */
        .error-msg {
            display: none;
            font-size: clamp(1rem, 2.5vw, 2rem);
            font-weight: 500;
            color: #E86851;
            text-align: center;
            letter-spacing: 0.05em;
            line-height: 1.6;
        }

        /* Finished state */
        .finished-msg {
            display: none;
            font-size: clamp(3rem, 8vw, 8rem);
            font-weight: 700;
            color: #E86851;
            text-align: center;
            letter-spacing: 0.05em;
            line-height: 1.2;
        }

        @media (max-width: 600px) {
            .logo-egl { width: 110px; top: 16px; left: 16px; }
            .logo-spark { width: 100px; top: 16px; right: 16px; }
            .countdown { gap: 6px; }
            .half.top  { border-radius: 8px 8px 0 0; }
            .half.bottom { border-radius: 0 0 8px 8px; }
        }

        @media (prefers-reduced-motion: reduce) {
            .fold-top { animation: none; transform: rotateX(-90deg); }
            .fold-bottom { animation: none; transform: rotateX(0deg); }
        }
    </style>
</head>
<body>

    <img class="logo-spark" src="spark-nz-logo.svg" alt="Spark NZ">

    <div class="main">
        <div class="title" id="title">Countdown</div>

        <div class="countdown" id="countdown">
            <div class="unit">
                <div class="flap" id="flap-days">
                    <div class="half top"><div class="num"><span>--</span></div></div>
                    <div class="half bottom"><div class="num"><span>--</span></div></div>
                    <div class="flap-divider"></div>
                </div>
                <div class="label">Days</div>
            </div>
            <div class="unit">
                <div class="flap" id="flap-hours">
                    <div class="half top"><div class="num"><span>--</span></div></div>
                    <div class="half bottom"><div class="num"><span>--</span></div></div>
                    <div class="flap-divider"></div>
                </div>
                <div class="label">Hours</div>
            </div>
            <div class="unit">
                <div class="flap" id="flap-minutes">
                    <div class="half top"><div class="num"><span>--</span></div></div>
                    <div class="half bottom"><div class="num"><span>--</span></div></div>
                    <div class="flap-divider"></div>
                </div>
                <div class="label">Minutes</div>
            </div>
            <div class="unit">
                <div class="flap" id="flap-seconds">
                    <div class="half top"><div class="num"><span>--</span></div></div>
                    <div class="half bottom"><div class="num"><span>--</span></div></div>
                    <div class="flap-divider"></div>
                </div>
                <div class="label">Seconds</div>
            </div>
        </div>

        <div class="finished-msg" id="finished">IT'S TIME!</div>
        <div class="error-msg" id="error"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);

        // Parse message
        const message = params.get('message') ? decodeURIComponent(params.get('message')) : 'Countdown';
        document.getElementById('title').textContent = message;
        document.title = message;

        // Parse date — accepts any ISO 8601 string, e.g.
        //   ?date=2026-07-01T00:00:00%2B12:00   (NZ time, + must be encoded)
        //   ?date=2026-07-01T09:00:00Z           (UTC)
        //   ?date=2026-07-01                     (treated as midnight UTC)
        const rawDate = params.get('date');
        let TARGET = null;

        if (rawDate) {
            TARGET = new Date(decodeURIComponent(rawDate));
        }

        const errorEl   = document.getElementById('error');
        const countdown = document.getElementById('countdown');
        const finished  = document.getElementById('finished');

        if (!rawDate || !TARGET || isNaN(TARGET.getTime())) {
            countdown.style.display = 'none';
            errorEl.style.display = 'block';
            errorEl.innerHTML = !rawDate
                ? 'No date provided.<br><small style="font-size:0.45em;opacity:0.6">Add <code>?date=2026-07-01T09:00:00Z&amp;message=Your+Event</code> to the URL</small>'
                : 'Invalid date: <code>' + rawDate + '</code>';
        } else {
            const flaps = {
                days:    document.getElementById('flap-days'),
                hours:   document.getElementById('flap-hours'),
                minutes: document.getElementById('flap-minutes'),
                seconds: document.getElementById('flap-seconds'),
            };

            function pad(n) { return String(n).padStart(2, '0'); }

            function getValue(flapEl) {
                return flapEl.querySelector('.half.top .num span').textContent;
            }

            function setFlap(flapEl, newVal) {
                const oldVal = getValue(flapEl);
                if (oldVal === newVal) return;

                const topHalf = flapEl.querySelector('.half.top .num span');
                const botHalf = flapEl.querySelector('.half.bottom .num span');

                const foldTop = document.createElement('div');
                foldTop.className = 'fold-top';
                foldTop.innerHTML = `<div class="num" style="top:0"><span>${oldVal}</span></div>`;

                const foldBot = document.createElement('div');
                foldBot.className = 'fold-bottom';
                foldBot.innerHTML = `<div class="num" style="bottom:0"><span>${newVal}</span></div>`;

                topHalf.textContent = newVal;

                flapEl.appendChild(foldTop);
                flapEl.appendChild(foldBot);

                setTimeout(() => {
                    botHalf.textContent = newVal;
                    foldTop.remove();
                    foldBot.remove();
                }, 420);
            }

            function tick() {
                const diff = TARGET.getTime() - Date.now();

                if (diff <= 0) {
                    countdown.style.display = 'none';
                    finished.style.display  = 'block';
                    return;
                }

                const totalSecs = Math.floor(diff / 1000);
                const d = Math.floor(totalSecs / 86400);
                const h = Math.floor((totalSecs % 86400) / 3600);
                const m = Math.floor((totalSecs % 3600) / 60);
                const s = totalSecs % 60;

                setFlap(flaps.days,    String(d));
                setFlap(flaps.hours,   pad(h));
                setFlap(flaps.minutes, pad(m));
                setFlap(flaps.seconds, pad(s));
            }

            tick();
            setInterval(tick, 250);
        }
    </script>
</body>
</html>
