<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA 2026 Quiz</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>" type="image/svg+xml">
    <link href="https://fonts.cdnfonts.com/css/neue-power" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        * { margin: 0; padding: 0; }
        html, body { height: 100%; }

        body {
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            font-family: 'Neue Power', sans-serif;
            overflow: hidden;
            background-color: #1a4d2e;
            background-image: repeating-linear-gradient(
                180deg,
                transparent 0px,
                transparent 80px,
                rgba(0, 0, 0, 0.06) 80px,
                rgba(0, 0, 0, 0.06) 160px
            );
        }

        img, picture, video, canvas, svg { display: block; max-width: 100%; }
        input, button, textarea, select { font: inherit; }

        h1, h2 {
            font-family: 'Neue Power', sans-serif;
            line-height: 1em;
            text-align: center;
        }

        #question, #answer {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 1200px;
            height: calc(100vh - 140px);
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transform-origin: center center;
            overflow: hidden;
            opacity: 1;
        }

        #answer {
            opacity: 0;
            pointer-events: none;
        }

        h1 {
            font-size: clamp(2.5rem, 7vw, 7rem);
            padding: 10px 10px 0;
            margin: 5px;
            color: #ffffff;
            font-weight: 500;
        }

        #question h2 {
            font-size: clamp(2rem, 5vw, 5rem);
            padding: 10px 10px 0;
            color: #ffffff;
            font-weight: 500;
            line-height: 1.3;
            word-wrap: break-word;
            overflow-wrap: break-word;
            hyphens: auto;
        }

        #answer h2 {
            font-size: clamp(2rem, 5vw, 5rem);
            padding: 10px 10px 0;
            color: #FFD700;
            font-weight: 500;
            line-height: 1.3;
            word-wrap: break-word;
            overflow-wrap: break-word;
            hyphens: auto;
        }

        #bar {
            position: absolute;
            bottom: 60px;
            width: 100%;
            height: 60px;
            display: flex;
            align-items: center;
        }

        #leftbar {
            background-color: #ffffff;
            width: 40px;
            height: 10px;
            border-radius: 5px;
            margin: 10px;
            position: absolute;
            left: 0;
        }

        #rightbar {
            background-color: rgba(255, 255, 255, 0.2);
            position: absolute;
            right: 0;
            width: 40px;
            height: 10px;
            border-radius: 5px;
            margin: 10px;
        }

        .logo {
            position: absolute;
            width: 220px;
            top: 30px;
            right: 30px;
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        @media (max-width: 768px) {
            .logo { width: 150px; top: 20px; right: 20px; }
            #question, #answer { width: 90%; }
        }
    </style>
</head>

    <div id="question">
        <h1>Q:</h1>
        <h2 id="question-text">Loading question...</h2>
    </div>

    <div id="answer">
        <h1>A:</h1>
        <h2 id="answer-text">Loading answer...</h2>
    </div>

    <div id="bar">
        <div id="leftbar"></div>
        <div id="rightbar"></div>
    </div>

    <script>
        const TIMING = {
            INITIAL_DELAY: 2500,
            ANIMATION_DURATION: 9750,
            FADE_OUT_AT: 11750,
            FADE_IN_AT: 12000,
            FADE_DURATION: 250,
        };

        const quizData = [
            // FIFA 2026
            ['Which three countries are co-hosting the 2026 FIFA World Cup?', 'USA, Canada and Mexico'],
            ['How many teams are competing in the 2026 FIFA World Cup?', '48 — the largest tournament ever'],
            ['Which stadium will host the 2026 FIFA World Cup final?', 'MetLife Stadium, East Rutherford, New Jersey'],
            ['How many host cities are there for the 2026 World Cup?', '16 — across three countries'],
            ['How many groups are there in the 2026 FIFA World Cup?', '12 groups of 4 teams'],
            ['Which legendary stadium hosted the 2026 World Cup opening match?', 'Estadio Azteca, Mexico City'],
            ['How many US cities are hosting 2026 World Cup matches?', '11'],
            ['Which two Canadian cities are hosting 2026 World Cup matches?', 'Toronto and Vancouver'],
            ['Which three Mexican cities are hosting 2026 World Cup matches?', 'Mexico City, Guadalajara, and Monterrey'],
            ['The 2026 World Cup expanded from 32 teams to 48. How many teams advance from the group stage?', '32 — top two from each group, plus the eight best third-placed teams'],

            // Recent World Cups
            ['Who won the 2022 FIFA World Cup?', 'Argentina'],
            ['Where was the 2022 FIFA World Cup held?', 'Qatar'],
            ['Who scored a hat-trick in the 2022 World Cup final?', 'Kylian Mbappé'],
            ['What was the score after extra time in the 2022 World Cup final?', '3–3 — Argentina won on penalties'],
            ['Who won the 2018 FIFA World Cup?', 'France'],
            ['Who won the Golden Boot at the 2022 FIFA World Cup?', 'Kylian Mbappé — 8 goals'],
            ['Who won the Golden Ball (best player) at the 2022 World Cup?', 'Lionel Messi'],
            ['Who won the 2014 FIFA World Cup?', 'Germany'],
            ['Who won the 2010 FIFA World Cup?', 'Spain'],
            ['Which country hosted the 2018 FIFA World Cup?', 'Russia'],
            ['Which country became the first from Africa to host the FIFA World Cup?', 'South Africa — in 2010'],

            // World Cup History
            ['Which country has won the most FIFA World Cups?', 'Brazil — five times'],
            ['Which team won the first FIFA World Cup in 1930?', 'Uruguay'],
            ['Where was the first FIFA World Cup held?', 'Uruguay'],
            ['Who holds the record for most World Cup goals across all tournaments?', 'Miroslav Klose — 16 goals'],
            ['Who scored the most goals in a single World Cup tournament?', 'Just Fontaine — 13 goals for France in 1958'],
            ['How many times has Germany won the World Cup?', 'Four — 1954, 1974, 1990, and 2014'],
            ['Which country reached three World Cup finals and lost them all?', 'Netherlands — 1974, 1978, and 2010'],
            ['Which country hosted both the 1970 and 1986 FIFA World Cups?', 'Mexico'],
            ['In what year did England win the World Cup?', '1966'],
            ['What does FIFA stand for?', 'Fédération Internationale de Football Association'],
            ['What year was FIFA founded?', '1904'],

            // Players
            ['How many Ballon d\'Or awards has Lionel Messi won?', 'Eight'],
            ['Which MLS club did Lionel Messi join in 2023?', 'Inter Miami'],
            ['Who scored the \'Goal of the Century\' at the 1986 World Cup?', 'Diego Maradona — against England in the quarter-final'],
            ['What squad number is Cristiano Ronaldo most associated with?', '7'],
            ['Which player is known as \'The Egyptian King\'?', 'Mohamed Salah'],
            ['Who is Brazil\'s all-time international top scorer?', 'Neymar'],
            ['For which national team does Kylian Mbappé play?', 'France'],
            ['Which Brazilian player is widely regarded as the greatest of all time?', 'Pelé'],
            ['How many World Cup finals has Lionel Messi appeared in?', 'Two — 2014 (lost to Germany) and 2022 (won vs France)'],
            ['Which player scored the infamous \'Hand of God\' goal in 1986?', 'Diego Maradona'],

            // Clubs & Competitions
            ['Which club has won the most UEFA Champions League titles?', 'Real Madrid'],
            ['Who is the all-time top scorer in UEFA Champions League history?', 'Cristiano Ronaldo'],
            ['What is the rivalry between Real Madrid and Barcelona called?', 'El Clásico'],
            ['Which Italian club is nicknamed \'La Vecchia Signora\' (The Old Lady)?', 'Juventus'],
            ['Who won UEFA Euro 2024?', 'Spain'],
            ['Which country hosted UEFA Euro 2024?', 'Germany'],
            ['What is the Copa América?', 'The South American international football championship'],
            ['Which English club holds the most Premier League titles?', 'Manchester United — 13 Premier League titles'],

            // Rules & General
            ['How long is a standard football match?', '90 minutes'],
            ['What does VAR stand for?', 'Video Assistant Referee'],
            ['How many substitutions are allowed per team in a FIFA World Cup match?', 'Five — plus one additional in extra time'],
            ['From what distance is a penalty kick taken?', '12 yards — approximately 11 metres from goal'],
            ['What colour card results in immediate dismissal?', 'Red'],
            ['What is a hat-trick in football?', 'Three goals scored by one player in a single match'],
            ['How many players are on a football team?', '11 on the pitch at a time'],
            ['In football, what does it mean to be offside?', 'A player is offside if nearer to the opponent\'s goal than both the ball and the second-last defender when the ball is played to them'],
        ];

        let questionQueue = [];

        function nextQuestion() {
            if (questionQueue.length === 0) {
                questionQueue = [...quizData].sort(() => Math.random() - 0.5);
            }
            return questionQueue.pop();
        }

        const questionDiv = document.getElementById('question');
        const answerDiv = document.getElementById('answer');
        const leftBar = document.getElementById('leftbar');
        const rightBar = document.getElementById('rightbar');

        let pendingTimeouts = [];

        function schedule(fn, delay) {
            pendingTimeouts.push(setTimeout(fn, delay));
        }

        function cancelAll() {
            pendingTimeouts.forEach(clearTimeout);
            pendingTimeouts = [];
        }

        function runQuizCycle() {
            cancelAll();

            const [question, answer] = nextQuestion();
            document.getElementById('question-text').textContent = question;
            document.getElementById('answer-text').textContent = answer;

            // Reset display state
            questionDiv.style.transition = 'none';
            questionDiv.style.opacity = '1';
            questionDiv.style.transform = 'translateX(-50%) scale(1)';
            answerDiv.style.transition = 'none';
            answerDiv.style.opacity = '0';
            answerDiv.style.pointerEvents = 'none';

            const maxWidth = window.innerWidth - 70;

            leftBar.style.transition = 'none';
            rightBar.style.transition = 'none';
            leftBar.style.width = '40px';
            rightBar.style.width = maxWidth + 'px';
            leftBar.offsetHeight; // force reflow

            schedule(() => {
                const t = `${TIMING.ANIMATION_DURATION}ms linear`;
                leftBar.style.transition = `width ${t}`;
                rightBar.style.transition = `width ${t}`;
                questionDiv.style.transition = `transform ${t}`;
                questionDiv.style.transform = 'translateX(-50%) scale(1.15)';
                leftBar.style.width = maxWidth + 'px';
                rightBar.style.width = '40px';
            }, TIMING.INITIAL_DELAY);

            schedule(() => {
                questionDiv.style.transition = `opacity ${TIMING.FADE_DURATION}ms ease`;
                questionDiv.style.opacity = '0';
            }, TIMING.FADE_OUT_AT);

            schedule(() => {
                answerDiv.style.transition = `opacity ${TIMING.FADE_DURATION}ms ease`;
                answerDiv.style.opacity = '1';
                answerDiv.style.pointerEvents = 'auto';
            }, TIMING.FADE_IN_AT);
        }

        window.addEventListener('resize', () => {
            const maxWidth = window.innerWidth - 70;
            if (parseFloat(leftBar.style.width) > 40) {
                leftBar.style.width = maxWidth + 'px';
            } else {
                rightBar.style.width = maxWidth + 'px';
            }
        });

        document.addEventListener('keydown', e => {
            if (e.key === ' ' || e.key === 'Enter') {
                e.preventDefault();
                runQuizCycle();
            }
        });

        runQuizCycle();
    </script>
</body>
</html>
